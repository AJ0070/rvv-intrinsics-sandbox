name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-gnu:
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        ubuntu: [24.04]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore apt cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-${{ matrix.ubuntu }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-${{ matrix.ubuntu }}-
            apt-${{ runner.os }}-

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu

      - name: Build RVV sandbox
        run: |
          make clean
          make -j"$(nproc)" TOOLCHAIN_PREFIX=riscv64-linux-gnu-

  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --std=c11 \
            -I include \
            src include

  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --dry-run --Werror src/*.c include/*.h

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell scripts
        run: |
          shellcheck scripts/run_emu.sh

  baremetal-compile-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bare-metal RISC-V toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-unknown-elf \
            binutils-riscv64-unknown-elf

      - name: Compile RVV sources for bare-metal
        run: |
          mkdir -p build
          riscv64-unknown-elf-gcc -std=c11 -O2 -Wall -Wextra -Werror -pedantic \
            -Iinclude -march=rv64gcv -mabi=lp64d -c src/math_scalar.c -o build/math_scalar.o
          riscv64-unknown-elf-gcc -std=c11 -O2 -Wall -Wextra -Werror -pedantic \
            -Iinclude -march=rv64gcv -mabi=lp64d -c src/math_rvv.c -o build/math_rvv.o
